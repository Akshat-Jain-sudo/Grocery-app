<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FreshCart — Premium grocery shopping. Browse fresh fruits, vegetables, dairy, bakery, beverages, and snacks delivered to your door.">
  <title>FreshCart — Fresh Groceries Delivered</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
</head>
<body>
  <!-- Header -->
  <header class="header" id="main-header">
    <div class="header__inner">
      <a href="#/" class="header__logo" id="logo-link">
        <span class="header__logo-icon">🛒</span>
        <span class="header__logo-text">Fresh<span class="text-accent">Cart</span></span>
      </a>
      <nav class="header__nav" id="main-nav">
        <a href="#/" class="nav-link" data-page="home" id="nav-home">Home</a>
        <a href="#/products" class="nav-link" data-page="products" id="nav-products">Products</a>
        <a href="#/cart" class="nav-link" data-page="cart" id="nav-cart">
          Cart
          <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
        </a>
      </nav>
      <button class="header__menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Main Content -->
  <main class="main-content" id="app">
    <div class="loading-screen" id="loading-screen">
      <div class="loading-spinner"></div>
      <p>Loading FreshCart...</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer" id="main-footer">
    <div class="footer__inner">
      <div class="footer__brand">
        <span class="header__logo-icon">🛒</span>
        <span class="header__logo-text">Fresh<span class="text-accent">Cart</span></span>
        <p class="footer__tagline">Fresh groceries, delivered with care.</p>
      </div>
      <div class="footer__links">
        <div class="footer__col">
          <h4>Shop</h4>
          <a href="#/products?category=fruits">Fruits</a>
          <a href="#/products?category=vegetables">Vegetables</a>
          <a href="#/products?category=dairy">Dairy & Eggs</a>
        </div>
        <div class="footer__col">
          <h4>More</h4>
          <a href="#/products?category=bakery">Bakery</a>
          <a href="#/products?category=beverages">Beverages</a>
          <a href="#/products?category=snacks">Snacks</a>
        </div>
        <div class="footer__col">
          <h4>Support</h4>
          <a href="#">Help Center</a>
          <a href="#">Delivery Info</a>
          <a href="#">Contact Us</a>
        </div>
      </div>
      <div class="footer__bottom">
        <p>© 2026 FreshCart. All rights reserved. Built with ❤️</p>
      </div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
